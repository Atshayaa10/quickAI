<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickAI</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#ffffff; display:flex; flex-direction:column; overflow:hidden; }

.header { background:#111; color:#fff; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.header-left { display:flex; align-items:center; gap:8px; }
.logo { font-size:18px; }
.title { font-size:15px; font-weight:600; }
.model-badge { font-size:10px; background:#2a2a2a; padding:3px 9px; border-radius:20px; color:#aaa; }

.quick-actions { padding:10px 12px; display:flex; gap:6px; flex-wrap:wrap; border-bottom:1px solid #f0f0f0; flex-shrink:0; background:#fafafa; }
.qa-btn { font-size:11px; padding:5px 10px; border-radius:20px; border:1.5px solid #e0e0e0; background:#fff; cursor:pointer; transition:all 0.15s; white-space:nowrap; font-weight:500; color:#333; }
.qa-btn:hover { background:#111; color:#fff; border-color:#111; }

.chat { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }

.msg { max-width:92%; padding:10px 13px; border-radius:12px; font-size:13px; line-height:1.6; word-break:break-word; }
.msg.user { background:#111; color:#fff; align-self:flex-end; border-radius:12px 12px 2px 12px; }
.msg.ai { background:#f5f5f5; color:#111; align-self:flex-start; border-radius:12px 12px 12px 2px; }
.msg.error { background:#fff0f0; color:#c0392b; align-self:flex-start; border-radius:12px; }
.msg.thinking { background:#f5f5f5; color:#888; align-self:flex-start; font-style:italic; border-radius:12px; }

.copy-btn { display:block; margin-top:6px; font-size:10px; color:#999; cursor:pointer; text-align:right; border:none; background:none; width:100%; }
.copy-btn:hover { color:#111; }

.input-area { padding:10px 12px; border-top:1px solid #eee; background:#fff; flex-shrink:0; }
.input-row { display:flex; gap:8px; align-items:flex-end; }
.chat-input { flex:1; border:1.5px solid #e0e0e0; border-radius:10px; padding:9px 12px; font-size:13px; resize:none; outline:none; font-family:inherit; line-height:1.4; transition:border 0.2s; }
.chat-input:focus { border-color:#111; }
.send-btn { background:#111; color:#fff; border:none; border-radius:10px; padding:9px 14px; cursor:pointer; font-size:15px; transition:opacity 0.2s; flex-shrink:0; height:38px; }
.send-btn:hover { opacity:0.8; }
.send-btn:disabled { opacity:0.35; cursor:not-allowed; }
.input-hint { font-size:10px; color:#bbb; margin-top:5px; }

.no-key { padding:24px 20px; text-align:center; }
.no-key h3 { color:#111; font-size:15px; margin-bottom:8px; }
.no-key p { color:#888; font-size:12px; line-height:1.6; }
.setup-link { display:inline-block; margin-top:14px; background:#111; color:#fff; padding:9px 20px; border-radius:8px; font-size:13px; cursor:pointer; border:none; font-weight:500; }
.setup-link:hover { opacity:0.85; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="title">QuickAI</span>
  </div>
</div>

<div class="quick-actions">
  <button class="qa-btn" data-prompt="Explain what this page is about in simple words">Explain page</button>
  <button class="qa-btn" data-prompt="Summarize the main points on this page in bullet points">Summarize</button>
  <button class="qa-btn" data-prompt="What are the key takeaways from this page?">Key points</button>
  <button class="qa-btn" data-prompt="Rewrite the following in simpler English">Simplify</button>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <div class="input-row">
    <textarea class="chat-input" id="chatInput" placeholder="Ask me anything..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn">Send</button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<script src="sidebar.js"></script>
</body>
</html>
