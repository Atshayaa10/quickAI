<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:300px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#fff; }
.header { background:#111; color:#fff; padding:16px; display:flex; align-items:center; gap:10px; }
.logo { font-size:20px; }
.title { font-size:15px; font-weight:600; }
.subtitle { font-size:11px; color:#999; margin-top:1px; }
.section { padding:16px; border-bottom:1px solid #f0f0f0; }
.label { font-size:11px; color:#666; margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.api-input { width:100%; border:1.5px solid #e0e0e0; border-radius:8px; padding:8px 12px; font-size:13px; outline:none; transition:border 0.2s; }
.api-input:focus { border-color:#111; }
.save-btn { width:100%; margin-top:8px; background:#111; color:#fff; border:none; border-radius:8px; padding:10px; font-size:13px; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
.save-btn:hover { opacity:0.85; }
.status { font-size:12px; margin-top:8px; padding:7px 10px; border-radius:6px; display:none; }
.status.ok  { background:#f0faf0; color:#1a7a44; display:block; }
.status.err { background:#fff0f0; color:#c0392b; display:block; }
.open-sidebar { width:calc(100% - 32px); margin:16px; background:#f5f5f5; border:1.5px solid #e0e0e0; border-radius:8px; padding:10px; font-size:13px; cursor:pointer; font-weight:500; display:block; transition:background 0.2s; }
.open-sidebar:hover { background:#e8e8e8; }
.tip { padding:12px 16px; font-size:11px; color:#888; line-height:1.7; }
.tip a { color:#111; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">QuickAI</div>
    <div class="subtitle">Powered by Groq — Free</div>
  </div>
</div>

<div class="section">
  <div class="label">Groq API Key</div>
  <input class="api-input" id="apiKey" type="password" placeholder="gsk_xxxxxxxxxxxx">
  <div class="status" id="status"></div>
  <button class="save-btn" id="saveBtn">Save &amp; Verify Key</button>
</div>


<button class="open-sidebar" id="openSidebar">Open AI Sidebar</button>

<div class="tip">
  Highlight text on any page and the AI bubble appears instantly.<br>
  Right-click selected text for more options.<br><br>
  Free API key: <strong>console.groq.com</strong>
</div>

<script src="popup.js"></script>
</body>
</html>
